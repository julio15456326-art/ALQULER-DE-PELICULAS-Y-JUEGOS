{% extends "base.html" %}

{% block title %}Iniciar sesión | Alquilando{% endblock %}

{% block content %}
    <section class="auth-section">
        <div class="auth-panel">
            <p class="eyebrow">Acceso</p>
            <h1>Iniciar sesión</h1>
            <p class="auth-copy">Ingresá con tu cuenta para ver el inventario y administrar tu experiencia.</p>

            <form class="auth-form" action="{{ url_for('login') }}" method="POST">
                <label for="email">Correo electrónico</label>
                <input id="email" type="email" name="email" placeholder="tuemail@ejemplo.com" required>

                <label for="password">Contraseña</label>
                <input id="password" type="password" name="password" placeholder="••••••••" required>

                <button class="btn btn-primary btn-full" type="submit">Ingresar</button>
            </form>

            <p class="auth-link">¿No tenés cuenta? <a href="{{ url_for('registro') }}">Registrate aquí</a></p>
        </div>
    </section>
{% endblock %}
