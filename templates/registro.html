{% extends "base.html" %}

{% block title %}Registrarse | Alquilando{% endblock %}

{% block content %}
    <section class="auth-section">
        <div class="auth-panel">
            <p class="eyebrow">Registro</p>
            <h1>Crear una cuenta</h1>
            <p class="auth-copy">Registrate para guardar tu acceso y aprovechar el catálogo con una experiencia más personalizada.</p>

            <form class="auth-form" action="{{ url_for('registro') }}" method="POST">
                <label for="nombre">Nombre completo</label>
                <input id="nombre" type="text" name="nombre" placeholder="Tu nombre" required>

                <label for="email">Correo electrónico</label>
                <input id="email" type="email" name="email" placeholder="tuemail@ejemplo.com" required>

                <label for="password">Contraseña</label>
                <input id="password" type="password" name="password" placeholder="••••••••" required>

                <button class="btn btn-primary btn-full" type="submit">Registrarse</button>
            </form>

            <p class="auth-link">¿Ya tenés cuenta? <a href="{{ url_for('login') }}">Iniciá sesión</a></p>
        </div>
    </section>
{% endblock %}
